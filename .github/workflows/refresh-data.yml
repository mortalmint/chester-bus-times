name: Refresh BODS data

on:
  workflow_dispatch:
  # Schedule is commented out until we've confirmed the workflow works.
  # schedule:
  #   - cron: '0 4 * * *'  # 04:00 UTC daily

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows the workflow to push the updated SQLite back.
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion
        env:
          BODS_API_KEY: ${{ secrets.BODS_API_KEY }}
        run: python ingest.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/chester.db
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh Chester GTFS data (automated)"
            git push
          fi
